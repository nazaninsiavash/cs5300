{% extends 'bookings/base.html' %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="container py-5 d-flex justify-content-center">
  <div class="auth-card p-4 p-md-5 w-100">
    <div class="text-center mb-4">
      <i class="bi bi-film display-4 text-danger"></i>
      <h3 class="text-white fw-bold mt-2">Welcome Back</h3>
      <p class="text-secondary">Sign in to book your seats</p>
    </div>

    <form method="post">
      {% csrf_token %}
      {% if form.errors %}
        <div class="alert alert-dark-danger mb-3">
          <i class="bi bi-exclamation-triangle-fill me-2"></i>
          Invalid username or password.
        </div>
      {% endif %}
      <div class="mb-3">
        <label class="form-label text-secondary small">Username</label>
        <input type="text" name="username" class="form-control form-control-dark"
               placeholder="Enter username" autofocus required/>
      </div>
      <div class="mb-4">
        <label class="form-label text-secondary small">Password</label>
        <input type="password" name="password" class="form-control form-control-dark"
               placeholder="Enter password" required/>
      </div>
      {% if next %}
        <input type="hidden" name="next" value="{{ next }}"/>
      {% endif %}
      <button type="submit" class="btn btn-cinema w-100 py-2">
        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
      </button>
    </form>

    <hr class="border-secondary my-4"/>
    <p class="text-secondary text-center small mb-0">
      No account?
      <a href="{% url 'signup' %}" class="text-danger">Sign up here</a>
    </p>
  </div>
</div>
{% endblock %}
