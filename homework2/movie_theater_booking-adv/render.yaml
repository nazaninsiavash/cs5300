services:
  - type: web
    name: cinebook
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py migrate && python manage.py seed_data
    startCommand: gunicorn movie_theater_booking.wsgi:application
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: movie_theater_booking.settings
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
